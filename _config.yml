  - title: Experience # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: TELUS
        link: telus.com
        link_text: Python | C++ | GCP | Postgres | Flask | PyTorch
        # additional_links:
        #   - title: Python | C++ | GCP | Postgres | Flask | PyTorch
        sub_title: Software Engineer Co-Op
        caption: January 2023 - Present
        # quote: >
        #   Python | C++ | GCP | Postgres | Flask | PyTorch
        description: | # this will include new lines to allow paragraphs
            Making quality software is a difficult, time consuming process. At TELUS, I designed systems from the ground up, leading to significant time-saves across multiple teams. I spearheaded the development of an XML analysis tool for 20+ person teams, automatically correcting errors between sets of files, and reducing the time spent per file by up to 95%. 
            
            I also developed a document extraction tool for the standards team in Python, using semi-supervised learning and OCR tech, potentially increasing the efficiency of data transfer by 90%. Finally, I finished the development and oversaw the prototyping process for a revenue prediction tool used for planning cell towers, opening a new avenue for the planning and strategy team.

      - layout: left
        title: University of Alberta
        link: ualberta.ca
        link_text: Python | PyTorch
        # additional_links:
        #   - title: Python | PyTorch
        sub_title: Machine Learning Researcher
        caption: January 2023 - Present
        quote: >
          Python | PyTorch
        description: | # this will include new lines to allow paragraphs
            As a machine learning researcher under Dr. Xingyu Li, I tackled the problem of how to use the world's rapidly growing repository of unlabelled data. I designed a novel algorithm for active few shot learning in computer vision that competed with state-of-the-art algorithms while using 80% less annotation data. 
            
            I wrote a co-first author paper based on this work, which is currently under review in a prestigious computer vision conference.


  - title: Education # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: University of Alberta
        caption: 2019 - 2024
        sub_title: B.Sc Electrical and Computer Engineering - Engineering Physics, Mathematics Minor
        # quote: >
        #   Established in 1636, Harvard is the oldest higher education institution in the United States, and is widely regarded in terms of its influence, reputation, and academic pedigree as a leading university in not just the US but also the world.
        description: | # this will include new lines to allow paragraphs
          At the University of Alberta, I learned that despite the surprising breadth of STEM fields, they are all much more closely connected than they let on. I took some of the most advanced mathematics, physics, electrical engineering, systems, and computing classes offered. I also got involved in research at every opportunity, even researching alongside my most recent developer position. I also got involved in competitive programming, and made it to Cyan in CodeForces.

          I am the President and founder of Gears in the Dark, a 40+ person tabletop gaming club. I was also a co-founder of Healthverse, a medical supplies redistribution charity that operated from 2019-2022. In addition, I was the merchandise coordinator for the Engineering Physics club from 2021-2022 (to record sales).

