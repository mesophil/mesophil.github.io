about_content: | # this will include new lines to allow paragraphs
  Hello! My name is Nico Schiavone. I'm a current fifth year Engineering Physics Major, Mathematics Minor at the University of Alberta. I work as a computer vision researcher with Dr. Xingyu Li.
  
  After graduation, I plan to enter into a Ph.D in Computer Science!

  My strengths are <mark>Python</mark> and <mark>Algorithm Design</mark>. I also know <mark>Java</mark>, <mark>C++</mark>, and a bit of <mark>C</mark>.

