about_content: | # this will include new lines to allow paragraphs
  Hello! My name is Nico Schiavone. I'm a current fifth year Engineering Physics Major, Mathematics Minor at the University of Alberta. I work as a software engineer at TELUS, and as a computer vision researcher with Dr. Xingyu Li.
  
  After graduation, I plan to enter into a Ph.D in Computer Science, or work as a software engineer in industry.

  My strengths are <mark>Python</mark> and <mark>Algorithm Design</mark>.

